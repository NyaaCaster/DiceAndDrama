<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" shape-rendering="crispEdges" image-rendering="pixelated" width="256" height="256">
  <title>Claude Code 章鱼 · idle frame 0（中位，参照 .ref/claude_code.png；可见内容居中）</title>
  <!-- 网格：16×16 大像素；身宽 11 大像素；包围盒 224×160 → 整体 +8 / +16 居中 -->
  <g fill="#F47F71">
    <!-- 头顶段 -->
    <rect x="42" y="48" width="172" height="32"/>
    <!-- 眼睛行底色 -->
    <rect x="42" y="80" width="172" height="32"/>
    <!-- 身体最宽段含双侧手臂凸起 -->
    <rect x="16" y="112" width="224" height="32"/>
    <!-- 腹部 -->
    <rect x="42" y="144" width="172" height="32"/>
    <!-- 4 触须脚（静态高 2 大像素） -->
    <rect x="56" y="176" width="16" height="32"/>
    <rect x="88" y="176" width="16" height="32"/>
    <rect x="152" y="176" width="16" height="32"/>
    <rect x="184" y="176" width="16" height="32"/>
  </g>
  <!-- 双眼：1 宽 × 2 高 -->
  <g fill="#1A1F2E">
    <rect x="72" y="80" width="16" height="32"/>
    <rect x="166" y="80" width="16" height="32"/>
  </g>
</svg>
