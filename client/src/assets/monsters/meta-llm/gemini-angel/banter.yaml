# Gemini 第五使徒 · Nyaa 误认 = Eva 第五使徒（拉米尔）
monsterId: gemini-angel
nyaaMisidentification: Eva 第五使徒（拉米尔）

encounter:
  - text: "诶——第五使徒来袭！全员就位，这玩意儿绝对体反射光线检定都打不进！"
    expressionKey: surprised
  - text: "等等让我抄家伙……AT 力场什么的，骰子呢骰子呢？"
    expressionKey: ear-twitch
  - text: "我记得这家伙的弱点是核心晶体——你们看那个白色的小八面体，瞄着它打！"
    expressionKey: smug

midBattle:
  - text: "我打了它一下……诶？没反应？"
    expressionKey: ear-twitch
  - text: "再来一发……还是没反应。喂喂，使徒大人？你死了吗？"
    expressionKey: eye-roll
  - text: "都两三个回合了它一动不动，是不是被我们一开始的输出秒了，没人通知它倒地？"
    expressionKey: sleepy
  - text: "等等等等——信号还在！这是『超长无响应』！它在憋大的！全员举盾！"
    expressionKey: surprised
  - text: "诶呀来了来了——前三回合压着没出的招一口气全砸过来啦！这就是一个回合内连放三次大招的『延迟连击』，AOE 叠 debuff 叠到天上去！"
    expressionKey: surprised
  - text: "下次它再装死，谁手里有【中断请求】就赶紧打断它读条——能砍掉一半连击伤害；要是有【流式输出】道具更好，把那波爆发摊回各回合就没那么疼了。"
    expressionKey: smug

defeat:
  - text: "搞定！这场拍下来够剪个特摄片头了——记得给我后期上 BGM。"
    expressionKey: smug
  - text: "EVA 系列圆满完成，回去申请奖金啦。"
    expressionKey: petting-cat
