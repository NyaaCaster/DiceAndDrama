# DeepSeek 北冥之鲲 · Nyaa 误认 = 北冥之鲲（庄子 · 逍遥游）
monsterId: deepseek-kun
nyaaMisidentification: 北冥之鲲

encounter:
  - text: "开局一只鲲——进化全靠吞！这条蓝鲸来头不小，属下已经掉过它三个广告页了。"
    expressionKey: surprised
  - text: "等会儿等会儿，这家伙吞掉一定数量的玩家就会化为鹏，到时候『其翼若垂天之云』我们要被天上压死。"
    expressionKey: eye-roll
  - text: "诸位别站它头顶——它一张嘴你们就成饲料了。"
    expressionKey: ear-twitch

midBattle:
  - text: "『算力熔断』！250 亿参数的虚空巨鲲张嘴了 Nyaa——它把全服务器的显存（VRAM）都吃光了！"
    expressionKey: surprised
  - text: "你们这回合的费用 / 行动点全被吞了，我的 Debug 锤都卡得挥不动了啦！！"
    expressionKey: ear-twitch
  - text: "好消息：吞完之后接下来 3 回合，咱们买卡用卡 -80% 费用——开局一只鲲，后面全靠吞，亏的是它账单。"
    expressionKey: smug
  - text: "看那些蓝色小方块！是它在吞咽时漏出来的训练 token！抢一些回来下次合成法术耗材！"
    expressionKey: smug

defeat:
  - text: "搞定！它没来得及变成鹏——这下我们不用担心『其翼若垂天之云』砸下来了。"
    expressionKey: smug
  - text: "鲲战利品 +1：散落一地的训练 token，可以换 2 个等级的经验值。"
    expressionKey: smug
